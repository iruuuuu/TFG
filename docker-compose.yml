version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: mendos-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mendos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mendos_password}
      POSTGRES_DB: ${POSTGRES_DB:-mendos_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mendos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Python Flask Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mendos-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mendos}:${POSTGRES_PASSWORD:-mendos_password}@db:5432/${POSTGRES_DB:-mendos_db}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-here}
      FLASK_ENV: ${FLASK_ENV:-production}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/auth/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # React Vite Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mendos-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
